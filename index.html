<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slider">
    <div class="slides">
      <div class="slide"><img src="download (1).jpg"></div>
      <div class="slide"><img src="download (2).jpg"></div>
      <div class="slide"><img src="download (3).jpg"></div>
      <div class="slide"><img src="download (4).jpg"></div>
    </div>

    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
